name: Release APK

on:
  push:
    branches:
      - 'claude/release-apk-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build GitHub Release APK
        run: bash ./gradlew assembleGithubRelease --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)"/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | sed 's/.*versionCode \(.*\)/\1/' | tr -d ' ')
          echo "name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: Zephyr ${{ steps.version.outputs.name }}
          body: |
            ## Zephyr ${{ steps.version.outputs.name }}

            Release APK for Zephyr launcher (version code: ${{ steps.version.outputs.code }}).
          files: app/build/outputs/apk/github/release/app-github-release-unsigned.apk
          draft: false
          prerelease: false
